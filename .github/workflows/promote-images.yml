name: Promote Images to Stable

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source tag to promote (default: latest)'
        required: true
        default: 'latest'

# Retags on Docker Hub (erenhex). Requires repo secret DOCKERHUB_TOKEN.
env:
  IMAGE_PREFIX: erenhex/retailbench-

jobs:
  promote:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image: [proxy, sandbox, evaluate, search-server]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: erenhex
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote ${{ matrix.image }} to stable
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          echo "Retagging ${{ matrix.image }}: ${SOURCE_TAG} → stable"
          docker buildx imagetools create \
            ${{ env.IMAGE_PREFIX }}${{ matrix.image }}:${SOURCE_TAG} \
            --tag ${{ env.IMAGE_PREFIX }}${{ matrix.image }}:stable
