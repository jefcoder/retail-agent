name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'docker/search-server/**'
      - 'docker/proxy/**'
      - 'docker/sandbox/**'
      - 'src/search_engine/**'
      - 'src/sandbox/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
      - '.github/workflows/integration-tests.yml'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build services
        run: |
          docker compose build search-server proxy sandbox

      - name: Start search server
        run: |
          docker compose up -d search-server
          timeout 120 bash -c 'until docker compose ps search-server | grep -q "healthy"; do sleep 2; done' || true

      - name: Start proxy
        run: |
          docker compose up -d proxy
          timeout 60 bash -c 'until docker compose ps proxy | grep -q "healthy"; do sleep 2; done' || true

      - name: Start sandbox (persistent, test-mode)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d sandbox
          docker ps --filter name=retailbench-sandbox --format '{{.Names}} {{.Status}}'

      - name: Install test dependencies
        run: |
          pip install requests pytest

      - name: Run sandbox isolation tests
        run: |
          pytest tests/integration/test_sandbox_isolation.py -v --tb=short

      - name: Show service logs on failure
        if: failure()
        run: |
          docker compose logs --tail 50 search-server
          docker compose logs --tail 50 proxy

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
